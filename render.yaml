# Render Blueprint for the MedTree backend (FastAPI + Cognee).
# Free plan: no persistent disk and the instance spins down after ~15 min idle. That's fine
# here — the Cognee graph is derived from Supabase, and the query path rebuilds it on demand
# if the dataset is missing after a restart (see _remember_user_graph in backend/main.py).
# To keep the graph persisted across restarts instead, switch plan to "starter" and add a
# `disk:` block mounted at /data (the Dockerfile already points Cognee's stores there).
services:
  - type: web
    name: medtree-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Comma-separated list of allowed frontend origins — set to your Vercel URL(s).
      - key: ALLOWED_ORIGINS
        sync: false
      # OpenAI powers Cognee's LLM extraction + embeddings. Note the name: Cognee reads the
      # OpenAI key from LLM_API_KEY (NOT OPENAI_API_KEY). Must have embedding credits.
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-4o-mini
      # Claude powers the clinical thesis.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-3-5-sonnet-20240620
      # Optional: Gemini is only used as the LLM fallback if Anthropic is unavailable.
      # Leave blank if you don't have a Gemini key.
      - key: GEMINI_API_KEY
        sync: false
